name: Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SSH_PORT }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_HOST:$SFTP_PORT;
            mirror --reverse --parallel=4 \
              --exclude='^\.git/' \
              --exclude='^\.github/' \
              --exclude='^node_modules/' \
              --verbose \
              . public_html/pages/;
            quit
          "
